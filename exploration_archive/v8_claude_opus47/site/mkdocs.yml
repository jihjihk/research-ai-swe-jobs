site_name: SWE Labor Market Exploration
site_description: 2024-2026 US LinkedIn software-engineering postings - exploration findings
site_author: Wave 5 Presentation Agent P
docs_dir: docs
site_dir: site
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.highlight
    - search.suggest

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji

nav:
  - Presentation:
      - index.md
  - Findings:
      - Overview: findings/index.md
      - "1. AI-vocabulary rewriting": findings/ai-rewriting.md
      - "2. Within-company scope broadening": findings/scope-broadening.md
      - "3. Senior-specific role shift": findings/senior-shift.md
      - "4. Employers under-specify AI": findings/rq3-inversion.md
      - "5. Seniority boundaries sharpened": findings/boundary-sharpening.md
      - What did not change: findings/what-didnt-change.md
  - Methodology:
      - Overview: methodology/overview.md
      - Preprocessing pipeline: methodology/preprocessing.md
      - Sensitivity framework: methodology/sensitivity-framework.md
      - Limitations: methodology/limitations.md
  - Narrative:
      - Synthesis: narrative/synthesis.md
      - Research question evolution: narrative/rq-evolution.md
      - Paper positioning: narrative/paper-positioning.md
      - Interview elicitation: narrative/interview.md
  - Audit trail:
      - Overview: raw/index.md
      - Wave 1 (data foundation): raw/wave-1-index.md
      - Wave 2 (structural discovery): raw/wave-2-index.md
      - Wave 3 (market dynamics): raw/wave-3-index.md
      - Verification: raw/verification-index.md
      - Wave 4 (synthesis): raw/wave-4-index.md
      - Gate memos: raw/memos-index.md
