site_name: SWE Labor Exploration (2024 to 2026)
site_description: Three-layer evidence package for the software-engineering labor-market exploration phase.
site_author: Exploration pipeline (Waves 1-5)
site_url: http://localhost:8080
use_directory_urls: true

docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - toc.integrate
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.share
  palette:
    - scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.smartsymbols

extra_css:
  - stylesheets/extra.css

nav:
  - Overview:
      - index.md
      - Slide deck: presentation.md
      - Executive summary: summary.md
      - How to read this site: how-to-read.md
  - Findings:
      - findings/index.md
      - A1 Cross-occupation AI divergence: findings/a1-cross-occupation-divergence.md
      - A2 Within-firm same-title rewriting: findings/a2-within-firm-rewriting.md
      - A3 Seniority boundaries sharpened: findings/a3-seniority-sharpening.md
      - A4 Scope inflation universal: findings/a4-scope-inflation.md
      - A5 Emergent senior archetypes: findings/a5-archetypes.md
      - A6 DiD robustness: findings/a6-did-robustness.md
      - What we rejected: findings/rejections.md
      - Measurement corrections: findings/corrections.md
  - Stories:
      - stories/index.md
      - 01 The narrowing middle that wasn't: stories/01-narrowing-middle.md
      - 02 The Copilot paradox: stories/02-copilot-paradox.md
      - 03 Atlanta, not San Francisco: stories/03-atlanta-not-san-francisco.md
      - 04 What the compliance lobby can't see: stories/04-finance-densest.md
      - 05 A decline that wasn't: stories/05-management-never-there.md
      - 06 The rejection of the easy explanation: stories/06-easy-explanations.md
      - 07 The democratiser that asks for more experience: stories/07-applied-ai-older.md
      - 08 The market got the pattern right: stories/08-ranking-right.md
      - 09 Forward-deployed, finally: stories/09-forward-deployed.md
      - 10 Where the middle narrowed: stories/10-where-middle-narrowed.md
  - Methodology:
      - methodology/index.md
      - Data sources and samples: methodology/data.md
      - Preprocessing pipeline: methodology/preprocessing.md
      - LLM prompts: methodology/llm-prompts.md
      - Sensitivity framework: methodology/sensitivity.md
      - Pattern validation: methodology/pattern-validation.md
      - What the paper can claim: methodology/claim-scope.md
      - Limitations: methodology/limitations.md
  - Audit trail:
      - evidence/index.md
      - Wave 1 reports: evidence/wave-1.md
      - Wave 2 reports: evidence/wave-2.md
      - Wave 3 reports: evidence/wave-3.md
      - Wave 3.5 reports: evidence/wave-3-5.md
      - Wave 4 reports: evidence/wave-4.md
      - Verifications: evidence/verifications.md
      - Gate memos: evidence/gates.md
      - Full synthesis: evidence/synthesis.md
