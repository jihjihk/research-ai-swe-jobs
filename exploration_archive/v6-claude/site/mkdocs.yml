site_name: SWE Labor Market Exploration
site_description: Findings package from the 2024-2026 SWE labor market exploration
site_author: Agent P (Wave 5)
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - toc.follow
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Home: index.md
  - Slides: layer1-presentation/index.md
  - Findings:
      - findings/index.md
      - "The AI explosion is field-wide": findings/01-ai-explosion-field-wide.md
      - "Posting language lags workers by 10x": findings/02-posting-lags-workers.md
      - "Senior orchestration specialization": findings/03-senior-orchestration.md
      - "Tool-stack restructuring and archetype pivot": findings/04-toolstack-pivot.md
      - "What does not survive": findings/05-what-does-not-survive.md
      - "Robustness framework (methods)": findings/06-robustness-framework.md
  - Methodology:
      - methodology/index.md
      - "Data sources": methodology/data-sources.md
      - "Preprocessing pipeline": methodology/preprocessing-pipeline.md
      - "Sensitivity framework": methodology/sensitivity-framework.md
      - "Limitations and open questions": methodology/limitations.md
  - Narrative:
      - narrative/index.md
      - "What the paper can and cannot claim": narrative/claims.md
      - "How the story evolved across gates": narrative/story-evolution.md
      - "Full synthesis document": narrative/SYNTHESIS.md
  - Audit trail:
