site_name: "SWE Labor Market Exploration — v1"
site_description: "Exploration v1 (Wave 1-3): raw findings from the SWE labor market restructuring study"
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
nav:
  - Overview: index.md
  - Synthesis: synthesis.md
  - Evidence:
      - Wave 1 — Data Foundation:
          - T01 Column Coverage Audit: reports/T01.md
          - T02 Seniority Variants: reports/T02.md
          - T03 Seniority Labels: reports/T03.md
          - T04 SWE Classification: reports/T04.md
          - T05 Cross-Dataset Comparability: reports/T05.md
          - T06 Company Concentration: reports/T06.md
          - T07 Geographic & Macro Benchmarks: reports/T07.md
      - Wave 2 — Discovery:
          - T08 Distributions: reports/T08.md
          - T09 Seniority Variant Sensitivity: reports/T09.md
          - T10 Temporal Language Drift: reports/T10.md
          - T11 Requirements Complexity: reports/T11.md
          - T12 Text Evolution: reports/T12.md
          - T13 Within-Company Decomposition: reports/T13.md
          - T14 Employer-Worker Divergence: reports/T14.md
          - T15 Data Quality Diagnostics: reports/T15.md
          - T16 Cross-Occupation Control: reports/T16.md
      - Wave 3 — Synthesis:
          - T17 Interview Artifacts: reports/T17.md
