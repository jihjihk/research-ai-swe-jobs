      - T05 Cross-Dataset: reports/T05.md
      - T06 Company Concentration: reports/T06.md
      - T07 Benchmarks & Power: reports/T07.md
      - Seniority Measurement Investigation: reports/seniority_measurement_investigation.md
    - Wave 2 — Discovery:
