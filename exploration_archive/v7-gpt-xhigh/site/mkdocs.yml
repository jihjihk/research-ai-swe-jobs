site_name: SWE Labor Market Exploration
site_description: Evidence package for Wave 5 Task T27
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.tabs.link
  palette:
    - scheme: default
      primary: white
      accent: teal
  font:
    text: Inter
    code: IBM Plex Mono

extra_css:
  - assets/stylesheets/site.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

validation:
  nav:
    omitted_files: ignore
  links:
    not_found: ignore

nav:
  - Overview:
      - Findings Overview: index.md
      - Slide Deck: slides.md
  - Findings:
      - Within-Company AI/Tool Expansion: findings/within-company-ai-tool-expansion.md
      - SWE-Amplified Adjacent-Parallel Expansion: findings/adjacent-parallel-expansion.md
      - Geographic Diffusion: findings/geographic-diffusion.md
      - Requirement and Tech Breadth: findings/requirement-tech-breadth.md
      - Seniority Label vs YOE Divergence: findings/seniority-label-yoe-divergence.md
      - Domain and Technology Structure: findings/domain-technology-structure.md
      - Claims and Caveats: findings/claims-and-caveats.md
  - Methods:
      - Preprocessing Pipeline: methods/preprocessing-pipeline.md
      - What We Can and Cannot Claim: methods/can-and-cannot-claim.md
  - Evidence Trail:
      - Raw Evidence Index: evidence/index.md
      - Synthesis Handoff: raw/reports/SYNTHESIS.md
      - Gate 1 Memo: raw/memos/gate_1.md
      - Gate 2 Memo: raw/memos/gate_2.md
      - Gate 3 Memo: raw/memos/gate_3.md
