<h1 id="most-people-assume-employers-demand-ai-skills-faster-than-workers-adopt-them-the-data-says-the-opposite">Most people assume employers demand AI skills faster than workers adopt them. The data says the opposite.</h1>
<ul>
<li><strong>Worker side (Stack Overflow 2025):</strong> 80.8% of professional developers use AI tools in their daily work.</li>
<li><strong>Employer side (2026 SWE LinkedIn postings):</strong> 28.6% mention AI at all, and only <strong>6.0%</strong> list it as a hard requirement.</li>
<li><strong>Gap:</strong> −52 percentage points on broad AI. Worker-to-posting ratio <strong>0.35</strong>.</li>
</ul>
<p><span class="cite">T23 Section 2 · T14 broad-union · V2 re-derivation Section 2</span></p>

<h1 id="this-talk-has-one-lead-finding-one-co-headline-one-structural-finding-and-one-null-result">This talk has one lead finding, one co-headline, one structural finding, and one null result</h1>
<ol>
<li><strong>Posting language <em>lags</em> worker AI adoption by ~10×.</strong> The paper's RQ3 direction inverts.</li>
<li><strong>Senior roles specialized toward hands-on technical orchestration, not people management.</strong> Clean and AI-linked.</li>
<li><strong>The AI tool-stack restructuring is field-wide, 92% within-company, and bifurcated</strong> into existing-employer adopters and a new-entrant LLM/GenAI wave.</li>
<li><strong>The junior-narrowing story does not survive robustness checks.</strong> Length growth is style migration. Seniority boundaries <em>sharpened</em>.</li>
</ol>
<p><span class="cite">Each of the next 20 slides is one point from this list.</span></p>

<h1 id="the-ai-rise-is-92-within-company-on-the-240-company-overlap-panel-and-survives-against-jolts-macro-noise-at-247%C3%97">The AI rise is 92% within-company on the 240-company overlap panel, and survives against JOLTS macro noise at 24.7×</h1>
<p><span class="cite">T16 · T19 · T29</span></p>
<ul>
<li><strong>Overlap panel broad AI:</strong> 4.02% → 26.93% (+22.91 pp), <strong>21.03 pp within-company (92%)</strong>.</li>
<li><strong>Macro-robustness ratio</strong> (cross-period / within-scraped-window): <strong>24.7×</strong> — above the 10× noise floor by a factor of 2.5.</li>
<li><strong>Authorship-style matched</strong> attenuation: <strong>0–7%</strong> — the rise is real content, not recruiter-LLM drafting artifact.</li>
</ul>
<p>Among the 186 panel companies with zero AI in 2024, within-company AI rose +0.229 by 2026. Existing employers retooled — it isn't a new-entrant composition effect.</p>

<h1 id="employers-describe-ai-as-what-youll-do-not-as-what-you-must-have--its-share-in-preferred-sections-tripled">Employers describe AI as what you'll <em>do</em>, not as what you must <em>have</em> — its share in <code>preferred</code> sections tripled</h1>

<li>AI's share in the <code>preferred</code> section <strong>tripled</strong>: 2.4% → 7.9%.</li>
<li><strong>Hard AI requirement rate: 6.0%</strong> in 2026 SWE postings. That's a 13.5× worker-to-posting gap at the requirement layer.</li>
</ul>
<p><strong>Reframe:</strong> postings are a <em>lagging</em> indicator of workplace AI adoption. Employer HR templates update slower than developer toolchains.</p>

<h1 id="the-paper-has-two-load-bearing-empirical-findings-and-one-methodological-contribution">The paper has two load-bearing empirical findings and one methodological contribution</h1>
<p><strong>Empirical:</strong></p>
<ol>
<li><strong>Posting language lags worker AI adoption by ~10× at the broad layer and ~13× at the hard-requirement layer.</strong> Job postings are a lagging indicator of workplace AI adoption, not an anticipating one. This inverts the popular &quot;employers demand impossible AI skills&quot; framing.</li>
<li><strong>Senior roles specialized toward hands-on technical orchestration, not people management.</strong> Directors became tech leads — the cleanest role redefinition signal in the corpus, and it is AI-linked.</li>
</ol>
<p><strong>Methodological:</strong></p>
<ol start="3">
<li><strong>A four-test robustness framework</strong> for longitudinal posting research: within-source calibration, specification dependence, macro-robustness ratios, and authorship-style matching. The aggregate junior-share null <em>under this framework</em> is itself a contribution — it tells us which past junior-narrowing findings will not replicate.</li>
</ol>
</section>

<h1 id="the-work-means-we-should-stop-reading-job-postings-as-a-mirror-of-actual-workplace-practice">The work means: we should stop reading job postings as a mirror of actual workplace practice</h1>
<p><span class="cite">Closing thought</span></p>
<ul>
<li>Companies are using AI daily, and their postings trail by years.</li>
<li>Job postings are a <em>template artifact</em> as much as a signal: 19% of companies rewrote their templates toward AI vocabulary, 75% pivoted their dominant archetype, and 89% of 2026 postings score above the 2024 recruiter-tool-drafting median.</li>
<li>Labor-market research that treats postings as a direct measurement instrument will systematically miss the lead-lag structure.</li>
<li><strong>Next:</strong> a longer post-2026 window to measure the posting update lag as a quantifiable, multi-year phenomenon, and qualitative interviews at the 46 tool-stack adopter companies to test the client-signaling hypothesis.</li>
</ul>
<p>Thank you.</p>
</section>
