# Scraper alert configuration
# Uncomment and fill in the methods you want to use.
# Multiple methods can be enabled simultaneously.

# --- Email (via SMTP) ---
# Requires: python3 with smtplib (built-in)
# For Gmail: use an App Password (not your regular password)
# https://myaccount.google.com/apppasswords
#
# ALERT_EMAIL_ENABLED=true
# ALERT_EMAIL_TO="you@example.com"
# ALERT_EMAIL_FROM="scraper@example.com"
# ALERT_EMAIL_SMTP_HOST="smtp.gmail.com"
# ALERT_EMAIL_SMTP_PORT=587
# ALERT_EMAIL_SMTP_USER="you@gmail.com"
# ALERT_EMAIL_SMTP_PASS="xxxx xxxx xxxx xxxx"

# --- Slack webhook ---
# Create one at: https://api.slack.com/messaging/webhooks
#
# ALERT_SLACK_ENABLED=true
# ALERT_SLACK_WEBHOOK_URL="https://hooks.slack.com/services/T.../B.../..."

# --- Discord webhook ---
# Right-click channel > Edit Channel > Integrations > Webhooks
#
# ALERT_DISCORD_ENABLED=true
# ALERT_DISCORD_WEBHOOK_URL="https://discord.com/api/webhooks/..."

# --- ntfy.sh (free push notifications, no signup) ---
# Install ntfy app on your phone, subscribe to your topic name
# Docs: https://ntfy.sh
#
# ALERT_NTFY_ENABLED=true
# ALERT_NTFY_TOPIC="my-swe-scraper"
# ALERT_NTFY_SERVER="https://ntfy.sh"

# --- Local file alert (for agents on the same server) ---
# Writes JSON status to a file your openclaw agent can watch/poll.
# The agent can monitor this file for changes or check "status" field.
#
ALERT_FILE_ENABLED=true
ALERT_FILE_PATH="/Users/jihyunkim/Desktop/research/data/scraper_status.json"

# --- macOS desktop notification ---
# Only works when logged into a desktop session (not via SSH/cron usually)
#
# ALERT_MACOS_ENABLED=true
