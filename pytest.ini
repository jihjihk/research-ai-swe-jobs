[pytest]
testpaths = tests
python_files = test_*.py
markers =
    unit: pure logic tests with no filesystem or network dependency
    fixture: tests that use checked-in synthetic fixtures
    sampled: tests that use reviewed real-data fixtures
    integration: stage-level tests that write temp outputs
    publish: fixture-driven stage-contract and final-assembly checks
    slow: tests that exercise heavier local dependencies such as embeddings
